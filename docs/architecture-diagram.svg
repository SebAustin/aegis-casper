  <title id="t">Aegis system architecture</title>
  <desc id="d">Autonomous RWA yield agent on Casper Testnet: a Next.js dashboard and Casper Wallet, an autonomous agent loop with an MCP server, an x402 oracle, an LLM provider and CSPR.cloud gateway, writing to Vault and Registry Odra contracts on Casper Testnet, indexed by cspr.live.</desc>
